  image: ''
  summary: I am a PhD student in Astronomy and Astrophysics at Penn State University.
    My research focuses on understanding the star formation histories of galaxies
    across cosmic time, with a particular emphasis on burstiness. I use a combination
    of observational data and theoretical modeling to investigate how star formation
    varies in different populations of galaxies. My work has implications for our
    understanding of galaxy formation and evolution, as well as the processes that
    regulate star formation in the universe.
