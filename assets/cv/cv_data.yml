research_experience:
- company: Penn State University
  position: Graduate Research Assistant
  start_year: 2023
  location: State College, PA, US
  summary: Developed tools (ESPS, PIGLET) to enable fast modeling of galaxy spectra
    in large surveys. Applied these tools to infer the recent star formation histories
    of galaxy populations across cosmic time, with a particular emphasis on burstiness.
    Presented results at conferences and seminars, and published research in peer-reviewed
    journals.
- company: Cosmic Dawn Center (DAWN), Neils Bohr Institute, University of Copenhagen
  position: NSF DAWN IRES Senior Scholar
  start_year: 2026
  end_year: 2026
  location: Copenhagen, Denmark
  summary: Mentored undergraduate students participating in the program and led workshops
    on research skills used in the field of galaxy formation and evolution. Continued
    thesis research while in residence at DAWN.
- company: University of Colorado at Boulder
  position: NSF REU Research Assistant
  start_year: 2021
  end_year: 2021
  location: Remote
  summary: Conducted research on how well modern radiative transfer codes can recover
    the absorption features in different spatial features (e.g., plage, faculae) of
    the solar disk. Presented results at the 2021 Winter American Geophysical Union
    meeting.
- company: Texas Christian University
  position: Undergraduate Research Assistant
  start_year: 2020
  end_year: 2023
  location: Fort Worth, TX, US
  summary: Conducted research on modeling the observable affects of a warm dark matter
    cosmology in the JWST era. Reduced spectra of nearby open clusters to calculate
    alpha element abundances. Presented results at the 2023 Winter American Astronomical
    Society meeting.
